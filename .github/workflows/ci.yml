name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        # macos-15, not -latest: since 2026-06 "latest" is macOS 26 beta,
        # whose SDK Zig 0.15.2 cannot link against (missing libSystem).
        os: [macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - run: zig build test
      - run: zig fmt --check src build.zig
